<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>พระคัมภีร์ไบเบิล - ครบทุกข้อ ทุกบท (Thai Standard 1971)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f2ec;
            font-family: 'Sarabun', 'Cordia New', 'Sukhumvit Set', 'Noto Sans Thai', system-ui, sans-serif;
            color: #2c2a25;
            line-height: 1.55;
            padding: 1rem;
        }
        .app {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e1d8cd;
        }
        header {
            background: #f1ebe2;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid #ddd2c2;
        }
        header h1 {
            font-size: 1.9rem;
            font-weight: 500;
            color: #2d4a2d;
        }
        header p {
            font-size: 0.85rem;
            color: #7a6c58;
            margin-top: 0.3rem;
        }
        .controls {
            background: #fff;
            padding: 1.2rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            border-bottom: 1px solid #ece3d9;
        }
        .ctrl-group {
            flex: 1;
            min-width: 140px;
        }
        .ctrl-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #9b8e7a;
            margin-bottom: 0.25rem;
        }
        select, button {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 0.6rem 0.8rem;
            border-radius: 16px;
            border: 1px solid #cfc4b4;
            background: #fffefc;
            width: 100%;
            cursor: pointer;
        }
        button {
            background: #f0ebe2;
            font-weight: 500;
            transition: 0.1s;
        }
        button:hover {
            background: #e6ddd1;
            border-color: #b7aa96;
        }
        .verses-panel {
            padding: 2rem;
            background: #fff;
            min-height: 500px;
        }
        .verse-item {
            margin-bottom: 1rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #f0e8df;
            display: flex;
            gap: 0.8rem;
            align-items: flex-start;
        }
        .verse-num {
            font-weight: 600;
            color: #a5825a;
            min-width: 2.5rem;
            font-size: 0.95rem;
        }
        .verse-text {
            flex: 1;
            font-size: 1rem;
            color: #1e1b16;
        }
        .loader, .error-msg, .info-msg {
            text-align: center;
            padding: 2rem;
            font-size: 1rem;
            color: #8f7a5c;
        }
        .error-msg {
            color: #b15a3c;
            background: #fff5f0;
            border-radius: 24px;
        }
        footer {
            background: #f9f7f3;
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #8b826e;
            border-top: 1px solid #eae2d6;
        }
        @media (max-width: 700px) {
            .controls, .verses-panel { padding: 1rem; }
            .verse-item { gap: 0.4rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>📖 พระคัมภีร์ไบเบิล</h1>
        <p>Thai Standard Version 1971 — พันธสัญญาเดิม + ใหม่ ครบทุกบท ทุกข้อ</p>
    </header>

    <div class="controls">
        <div class="ctrl-group">
            <label>พันธสัญญา</label>
            <select id="testamentSelect">
                <option value="ot">เดิม (Old Testament)</option>
                <option value="nt">ใหม่ (New Testament)</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>หนังสือ</label>
            <select id="bookSelect"></select>
        </div>
        <div class="ctrl-group">
            <label>บทที่</label>
            <select id="chapterSelect"></select>
        </div>
        <div class="ctrl-group">
            <button id="loadBtn">🔍 อ่านบทนี้</button>
        </div>
    </div>

    <div class="verses-panel" id="versesContainer">
        <div class="loader">⏳ กำลังโหลดข้อมูลพระคัมภีร์... กรุณารอสักครู่</div>
    </div>

    <footer>
        ข้อมูลพระคัมภีร์จาก <strong>bible-api.com (GitHub mirror)</strong> • ไม่มีปัญหา CORS • ใช้งานออฟไลน์ไม่ได้ (ต้องมีอินเทอร์เน็ต)
    </footer>
</div>

<script>
    // --------------------------------------------------------------
    // ใช้ JSON พระคัมภีร์ Thai Standard 1971 จาก GitHub raw (CORS enabled)
    // --------------------------------------------------------------
    const BIBLE_API_URL = 'https://raw.githubusercontent.com/wldeh/bible-api/master/bibles/th-th1971.json';

    let fullBible = null;         // เก็บโครงสร้าง { books: [ { name, chapters: [[...]] } ] }
    let otBooks = [];             // รายชื่อหนังสือ OT
    let ntBooks = [];             // รายชื่อหนังสือ NT

    const testamentSelect = document.getElementById('testamentSelect');
    const bookSelect = document.getElementById('bookSelect');
    const chapterSelect = document.getElementById('chapterSelect');
    const loadBtn = document.getElementById('loadBtn');
    const versesContainer = document.getElementById('versesContainer');

    // 1. โหลดข้อมูลพระคัมภีร์ทั้งหมดจาก GitHub
    async function loadBibleData() {
        try {
            versesContainer.innerHTML = '<div class="loader">📖 กำลังโหลดพระคัมภีร์ (Thai Standard 1971) ...</div>';
            const response = await fetch(BIBLE_API_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status} — โหลดไม่สำเร็จ`);
            const data = await response.json();
            fullBible = data;  // { books: [ { name: "ปฐมกาล", chapters: [ [ข้อ1,ข้อ2,...], ... ] } ] }
            
            // แยกหนังสือ OT / NT โดยหาตำแหน่งของ "มัทธิว" เป็นจุดตัด
            const allBooks = fullBible.books;
            const matthewIndex = allBooks.findIndex(book => book.name === "มัทธิว");
            otBooks = allBooks.slice(0, matthewIndex);
            ntBooks = allBooks.slice(matthewIndex);
            
            // เติม dropdown หนังสือตามพันธสัญญาที่เลือก
            populateBooks();
            // โหลดบทแรกเริ่มต้น (ปฐมกาล บทที่ 1)
            loadChapter();
        } catch (err) {
            console.error(err);
            versesContainer.innerHTML = `<div class="error-msg">❌ เกิดข้อผิดพลาด: ${err.message}<br>👉 กรุณาตรวจสอบอินเทอร์เน็ต หรือรีเฟรชหน้าใหม่</div>`;
        }
    }

    // เติม dropdown หนังสือตามพันธสัญญา
    function populateBooks() {
        const isOT = testamentSelect.value === 'ot';
        const books = isOT ? otBooks : ntBooks;
        bookSelect.innerHTML = '';
        books.forEach((book, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = book.name;
            bookSelect.appendChild(option);
        });
        updateChapterDropdown();
    }

    // อัปเดต dropdown บท (จำนวนบทขึ้นอยู่กับหนังสือที่เลือก)
    function updateChapterDropdown() {
        const isOT = testamentSelect.value === 'ot';
        const books = isOT ? otBooks : ntBooks;
        const bookIdx = parseInt(bookSelect.value);
        if (isNaN(bookIdx)) return;
        const book = books[bookIdx];
        if (!book) return;
        const numChapters = book.chapters.length;
        chapterSelect.innerHTML = '';
        for (let i = 1; i <= numChapters; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i;
            chapterSelect.appendChild(opt);
        }
        chapterSelect.value = 1;  // ค่าเริ่มต้นบทที่ 1
    }

    // อ่านบทที่เลือกและแสดงผล
    function loadChapter() {
        if (!fullBible) {
            versesContainer.innerHTML = '<div class="error-msg">ยังไม่โหลดข้อมูลพระคัมภีร์เสร็จ กรุณารอสักครู่</div>';
            return;
        }
        const isOT = testamentSelect.value === 'ot';
        const books = isOT ? otBooks : ntBooks;
        const bookIdx = parseInt(bookSelect.value);
        const chapterIdx = parseInt(chapterSelect.value) - 1;  // chapters เป็น array 0-index
        if (isNaN(bookIdx) || isNaN(chapterIdx)) return;
        
        const book = books[bookIdx];
        if (!book || !book.chapters[chapterIdx]) {
            versesContainer.innerHTML = `<div class="error-msg">❌ ไม่พบข้อความใน ${book?.name || 'หนังสือ'} บทที่ ${chapterIdx+1}</div>`;
            return;
        }
        
        const verses = book.chapters[chapterIdx];
        renderVerses(book.name, chapterIdx+1, verses);
    }

    function renderVerses(bookName, chapterNum, versesArray) {
        versesContainer.innerHTML = '';
        // หัวข้อบท
        const headerDiv = document.createElement('div');
        headerDiv.style.marginBottom = '1.2rem';
        headerDiv.style.fontWeight = '600';
        headerDiv.style.color = '#7d6b53';
        headerDiv.style.borderLeft = '4px solid #b48c5c';
        headerDiv.style.paddingLeft = '0.8rem';
        headerDiv.textContent = `${bookName} ${chapterNum} — ${versesArray.length} ข้อ`;
        versesContainer.appendChild(headerDiv);
        
        // แสดงแต่ละข้อ
        for (let i = 0; i < versesArray.length; i++) {
            const verseDiv = document.createElement('div');
            verseDiv.className = 'verse-item';
            const numSpan = document.createElement('div');
            numSpan.className = 'verse-num';
            numSpan.textContent = i+1;
            const textSpan = document.createElement('div');
            textSpan.className = 'verse-text';
            textSpan.textContent = versesArray[i];
            verseDiv.appendChild(numSpan);
            verseDiv.appendChild(textSpan);
            versesContainer.appendChild(verseDiv);
        }
    }

    // --- event listeners ---
    testamentSelect.addEventListener('change', () => {
        populateBooks();
        loadChapter();
    });
    bookSelect.addEventListener('change', () => {
        updateChapterDropdown();
        loadChapter();
    });
    chapterSelect.addEventListener('change', () => {
        loadChapter();
    });
    loadBtn.addEventListener('click', () => {
        loadChapter();
    });

    // เริ่มต้นโหลดข้อมูลพระคัมภีร์
    loadBibleData();
</script>
</body>
</html>
