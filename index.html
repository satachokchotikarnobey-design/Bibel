<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>The Word of God - พระคัมภีร์ทุกข้อ ทุกบท (ครบถ้วน)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f2ec;
            font-family: 'Sarabun', 'Cordia New', 'Sukhumvit Set', 'Noto Sans Thai', system-ui, serif;
            color: #2c2a25;
            line-height: 1.55;
            padding: 1.5rem 1rem;
        }
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            overflow: hidden;
            border: 1px solid #e1d8cd;
        }
        header {
            background: #f1ebe2;
            padding: 1.6rem 2rem;
            border-bottom: 1px solid #ddd2c2;
            text-align: center;
        }
        header h1 { font-size: 2rem; font-weight: 500; color: #2d4a2d; }
        header .sub { font-size: 0.85rem; color: #7a6c58; margin-top: 0.3rem; }
        .typography-bar {
            background: #fefcf8;
            padding: 0.7rem 2rem;
            border-bottom: 1px solid #ece3d9;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .font-control { display: flex; align-items: center; gap: 0.6rem; }
        .font-control label { font-size: 0.8rem; font-weight: 500; color: #6b5e4c; }
        .font-control select { padding: 0.3rem 0.6rem; border-radius: 30px; border: 1px solid #cfc4b4; background: white; font-size: 0.85rem; }
        .version-bar {
            background: #fefcf8;
            padding: 0.7rem 2rem;
            border-bottom: 1px solid #ece3d9;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .toolbar {
            background: #ffffff;
            padding: 1.2rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
            border-bottom: 1px solid #ece3d9;
        }
        .field { flex: 1; min-width: 140px; }
        .field label { display: block; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #9b8e7a; margin-bottom: 0.25rem; }
        select, button, input { font-family: inherit; font-size: 0.9rem; padding: 0.55rem 0.8rem; border-radius: 14px; border: 1px solid #cfc4b4; background: #fffefc; width: 100%; }
        button { background: #f0ebe2; cursor: pointer; font-weight: 500; transition: 0.1s; }
        button:hover { background: #e6ddd1; border-color: #b7aa96; }
        .verses-area { padding: 2rem; background: #ffffff; min-height: 500px; transition: all 0.1s ease; }
        .verse-card { margin-bottom: 1rem; padding: 0.5rem 0.8rem 0.5rem 0; border-bottom: 1px solid #f0e8df; display: flex; align-items: flex-start; gap: 0.6rem; }
        .verse-number { font-weight: 500; color: #a5825a; min-width: 2.8rem; font-size: 1rem; }
        .verse-text { flex: 1; cursor: pointer; padding: 0.2rem 0.4rem; border-radius: 14px; }
        .verse-text.highlight { background-color: #fff1cc; }
        .verse-actions { display: flex; gap: 0.4rem; align-items: center; }
        .note-btn { background: none; border: none; font-size: 0.75rem; color: #a0825a; cursor: pointer; width: auto; padding: 0.2rem 0.6rem; border-radius: 30px; }
        .note-preview { font-size: 0.7rem; color: #b88b4b; background: #fef5e8; padding: 0.15rem 0.6rem; border-radius: 20px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fffef7; padding: 1.8rem; border-radius: 32px; width: 340px; max-width: 90%; box-shadow: 0 12px 28px rgba(0,0,0,0.2); }
        .color-options { display: flex; gap: 0.7rem; margin: 1rem 0; flex-wrap: wrap; }
        .color-chip { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 1px solid #ccc; }
        .note-input { width: 100%; padding: 0.6rem; margin: 0.8rem 0; border-radius: 20px; border: 1px solid #ddd2c2; font-family: inherit; resize: vertical; }
        .loading, .error, .info { text-align: center; padding: 2rem; color: #8f7a5c; }
        .error { color: #b15a3c; background: #fff5f0; border-radius: 20px; }
        footer { background: #f9f7f3; text-align: center; padding: 1rem; font-size: 0.7rem; color: #8b826e; border-top: 1px solid #eae2d6; }
        @media (max-width: 700px) { .verse-card { flex-wrap: wrap; } .note-preview { white-space: normal; max-width: 150px; } }
    </style>
</head>
<body>
<div class="main-container">
    <header>
        <h1>The Word of God</h1>
        <div class="sub">พระคัมภีร์พันธสัญญาเดิมและใหม่ — ทุกข้อ ทุกบท ครบถ้วนสมบูรณ์ (Thai Standard 1971)</div>
    </header>
    <div class="typography-bar">
        <div class="font-control"><label>แบบอักษร:</label><select id="fontFamilySelect"><option value="'Sarabun', 'Cordia New', 'Sukhumvit Set', sans-serif">Sarabun</option><option value="'Noto Sans Thai', 'Sarabun', sans-serif" selected>Noto Sans Thai</option><option value="'Times New Roman', serif">Times New Roman</option></select></div>
        <div class="font-control"><label>ขนาดอักษร:</label><select id="fontSizeSelect"><option value="14px">14 px</option><option value="16px" selected>16 px</option><option value="18px">18 px</option><option value="20px">20 px</option></select></div>
        <div class="font-control"><label>ระยะห่างบรรทัด:</label><select id="lineHeightSelect"><option value="1.4">1.4</option><option value="1.55" selected>1.55</option><option value="1.7">1.7</option></select></div>
    </div>
    <div class="toolbar">
        <div class="field"><label>พันธสัญญา</label><select id="testamentSelect"><option value="ot">เดิม (Old Testament)</option><option value="nt">ใหม่ (New Testament)</option></select></div>
        <div class="field"><label>หนังสือ</label><select id="bookSelect"></select></div>
        <div class="field"><label>บทที่</label><select id="chapterSelect"></select></div>
        <div class="field"><button id="loadBtn">อ่านบทนี้</button></div>
    </div>
    <div class="verses-area" id="versesContainer"><div class="info">กำลังโหลดข้อมูลพระคัมภีร์ กรุณารอสักครู่...</div></div>
    <footer>ข้อมูลพระคัมภีร์ Thai Standard 1971 ครบถ้วนทุกข้อ ทุกบท • โน้ตและสีถูกบันทึกในเครื่อง (localStorage)</footer>
</div>
<div id="noteModal" class="modal"><div class="modal-content"><h4>บันทึกคำอธิบาย / เปลี่ยนสี</h4><div class="color-options" id="colorOptions"></div><textarea id="noteTextArea" rows="2" placeholder="จดบันทึก" class="note-input"></textarea><div style="display: flex; gap: 0.7rem; margin-top: 1rem;"><button id="saveNoteBtn">บันทึก</button><button id="closeModalBtn">ยกเลิก</button></div></div></div>

<script>
    // ------------------- ข้อมูลพระคัมภีร์แบบสถิต (โหลดจาก GitHub JSON) -------------------
    let bibleData = null; // จะเก็บโครงสร้าง { books: [{ name: "ปฐมกาล", chapters: [[ข้อ1,ข้อ2,...], ...] }] }
    let currentBooksList = [];
    let currentBookIdx = 0;
    let currentChapter = 1;

    // โหลด JSON จาก GitHub (รับประกัน CORS ผ่านได้)
    async function loadBibleJSON() {
        const container = document.getElementById("versesContainer");
        container.innerHTML = '<div class="loading">📖 กำลังโหลดพระคัมภีร์ฉบับสมบูรณ์ (Thai Standard 1971)...</div>';
        try {
            // ที่อยู่ไฟล์ JSON ของ Thai Standard 1971 (จาก bible-api github)
            const url = "https://raw.githubusercontent.com/wldeh/bible-api/master/bibles/th-th1971.json";
            const response = await fetch(url);
            if (!response.ok) throw new Error("HTTP " + response.status);
            const json = await response.json();
            bibleData = json;
            // ตรวจสอบโครงสร้าง: ต้องมี books array
            if (!bibleData.books || bibleData.books.length === 0) throw new Error("ข้อมูลไม่ถูกต้อง");
            // เตรียม dropdown หนังสือ
            populateBooks();
            // โหลดบทแรกเริ่มต้น (ปฐมกาล บทที่ 1)
            if (currentBooksList.length > 0) {
                const firstBook = currentBooksList[0];
                const firstBookObj = bibleData.books.find(b => b.name === firstBook);
                if (firstBookObj && firstBookObj.chapters.length > 0) {
                    renderChapter(0, 0); // bookIndex 0, chapterIndex 0
                } else {
                    container.innerHTML = '<div class="error">ไม่พบข้อมูลบทที่ 1</div>';
                }
            }
        } catch (err) {
            console.error(err);
            document.getElementById("versesContainer").innerHTML = `<div class="error">❌ โหลดข้อมูลพระคัมภีร์ไม่สำเร็จ: ${err.message}<br>กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต หรือรีเฟรชหน้าใหม่</div>`;
        }
    }

    // เติม dropdown หนังสือตามพันธสัญญา
    function populateBooks() {
        if (!bibleData) return;
        const testament = document.getElementById("testamentSelect").value;
        // กรองหนังสือตามพันธสัญญา: OT = หนังสือก่อนมัทธิว, NT = ตั้งแต่มัทธิว
        const allBooks = bibleData.books;
        const ntStartIndex = allBooks.findIndex(b => b.name === "มัทธิว");
        if (testament === "ot") {
            currentBooksList = allBooks.slice(0, ntStartIndex).map(b => b.name);
        } else {
            currentBooksList = allBooks.slice(ntStartIndex).map(b => b.name);
        }
        const bookSelect = document.getElementById("bookSelect");
        bookSelect.innerHTML = "";
        currentBooksList.forEach((book, idx) => {
            const opt = document.createElement("option");
            opt.value = idx;
            opt.textContent = book;
            bookSelect.appendChild(opt);
        });
        // รีเซ็ตบท
        const chapterSelect = document.getElementById("chapterSelect");
        const bookObj = bibleData.books.find(b => b.name === currentBooksList[0]);
        if (bookObj) {
            const numChapters = bookObj.chapters.length;
            chapterSelect.innerHTML = "";
            for (let i = 1; i <= numChapters; i++) {
                const opt = document.createElement("option");
                opt.value = i;
                opt.textContent = i;
                chapterSelect.appendChild(opt);
            }
            chapterSelect.value = "1";
            currentChapter = 1;
        }
        currentBookIdx = 0;
    }

    // เรนเดอร์บทที่เลือก
    function renderChapter(bookIdx, chapterIdx) {
        if (!bibleData) return;
        const bookName = currentBooksList[bookIdx];
        const bookObj = bibleData.books.find(b => b.name === bookName);
        if (!bookObj || chapterIdx >= bookObj.chapters.length) {
            document.getElementById("versesContainer").innerHTML = '<div class="error">ไม่มีข้อมูลในบทนี้</div>';
            return;
        }
        const chapterVerses = bookObj.chapters[chapterIdx]; // array of verse strings
        const container = document.getElementById("versesContainer");
        container.innerHTML = "";
        const header = document.createElement("div");
        header.style.marginBottom = "1rem";
        header.style.fontWeight = "bold";
        header.style.borderLeft = "4px solid #b48c5c";
        header.style.paddingLeft = "0.8rem";
        header.textContent = `${bookName} ${chapterIdx+1} (Thai Standard 1971) — ${chapterVerses.length} ข้อ`;
        container.appendChild(header);

        for (let i = 0; i < chapterVerses.length; i++) {
            const verseNum = i+1;
            const verseText = chapterVerses[i];
            const verseDiv = document.createElement("div");
            verseDiv.className = "verse-card";
            verseDiv.setAttribute("data-book", bookName);
            verseDiv.setAttribute("data-chapter", chapterIdx+1);
            verseDiv.setAttribute("data-verse", verseNum);
            const numSpan = document.createElement("span");
            numSpan.className = "verse-number";
            numSpan.textContent = verseNum;
            const textSpan = document.createElement("span");
            textSpan.className = "verse-text";
            textSpan.textContent = verseText;
            textSpan.addEventListener("click", () => openNoteModal(bookName, chapterIdx+1, verseNum, textSpan));
            const actionsDiv = document.createElement("div");
            actionsDiv.className = "verse-actions";
            const noteBtn = document.createElement("button");
            noteBtn.textContent = "📝";
            noteBtn.className = "note-btn";
            noteBtn.addEventListener("click", (e) => { e.stopPropagation(); openNoteModal(bookName, chapterIdx+1, verseNum, textSpan); });
            actionsDiv.appendChild(noteBtn);
            const saved = loadNoteForVerse(bookName, chapterIdx+1, verseNum);
            if (saved) {
                if (saved.color) { textSpan.style.backgroundColor = saved.color; textSpan.classList.add("highlight"); }
                if (saved.note) {
                    const previewSpan = document.createElement("span");
                    previewSpan.className = "note-preview";
                    previewSpan.textContent = saved.note.length > 35 ? saved.note.slice(0,32)+"..." : saved.note;
                    actionsDiv.appendChild(previewSpan);
                }
            }
            verseDiv.appendChild(numSpan);
            verseDiv.appendChild(textSpan);
            verseDiv.appendChild(actionsDiv);
            container.appendChild(verseDiv);
        }
        applyTypography();
    }

    // โน้ตและสี (เหมือนเดิม)
    function getNoteKey(book, chapter, verse) { return `bibleNote_${book}_${chapter}_${verse}`; }
    function loadNoteForVerse(book, chapter, verse) {
        const key = getNoteKey(book, chapter, verse);
        const data = localStorage.getItem(key);
        if (data) { try { return JSON.parse(data); } catch(e) { return null; } }
        return null;
    }
    function saveNoteForVerse(book, chapter, verse, noteText, colorHex) {
        const key = getNoteKey(book, chapter, verse);
        localStorage.setItem(key, JSON.stringify({ note: noteText || "", color: colorHex || null }));
    }
    const colorPalette = ["#fff1cc", "#e6f0fa", "#e2f4e2", "#ffe0e0", "#f0e6ff", null];
    let currentEditing = { book: null, chapter: null, verse: null, textSpan: null };
    function openNoteModal(book, chapter, verse, textSpan) {
        const existing = loadNoteForVerse(book, chapter, verse);
        currentEditing = { book, chapter, verse, textSpan };
        document.getElementById("noteTextArea").value = existing?.note || "";
        const colorContainer = document.getElementById("colorOptions");
        colorContainer.innerHTML = "";
        colorPalette.forEach((color, idx) => {
            const chip = document.createElement("div");
            chip.className = "color-chip";
            chip.style.backgroundColor = color || "#f0f0f0";
            chip.style.border = color ? "1px solid #bbb" : "1px dashed #aaa";
            chip.title = color ? "สี" : "ไม่มีสี";
            chip.addEventListener("click", () => {
                if (textSpan) {
                    if (color) { textSpan.style.backgroundColor = color; textSpan.classList.add("highlight"); }
                    else { textSpan.style.backgroundColor = ""; textSpan.classList.remove("highlight"); }
                }
                const noteText = document.getElementById("noteTextArea").value;
                saveNoteForVerse(book, chapter, verse, noteText, color);
                updateNotePreview(book, chapter, verse, noteText, color);
            });
            colorContainer.appendChild(chip);
        });
        document.getElementById("noteModal").style.display = "flex";
    }
    function updateNotePreview(book, chapter, verse, noteText, colorHex) {
        const cards = document.querySelectorAll(`.verse-card[data-book="${book}"][data-chapter="${chapter}"][data-verse="${verse}"]`);
        cards.forEach(card => {
            let previewSpan = card.querySelector(".note-preview");
            if (noteText && noteText.trim() !== "") {
                if (!previewSpan) {
                    const actionsDiv = card.querySelector(".verse-actions");
                    const newPreview = document.createElement("span");
                    newPreview.className = "note-preview";
                    newPreview.textContent = noteText.length > 35 ? noteText.slice(0,32)+"..." : noteText;
                    actionsDiv.appendChild(newPreview);
                } else previewSpan.textContent = noteText.length > 35 ? noteText.slice(0,32)+"..." : noteText;
            } else if (previewSpan) previewSpan.remove();
            const textSpan = card.querySelector(".verse-text");
            if (textSpan && colorHex) { textSpan.style.backgroundColor = colorHex; textSpan.classList.add("highlight"); }
            else if (textSpan) { textSpan.style.backgroundColor = ""; textSpan.classList.remove("highlight"); }
        });
    }

    // ฟอนต์
    function applyTypography() {
        const fontFamily = localStorage.getItem('bible_fontFamily') || "'Noto Sans Thai', 'Sarabun', sans-serif";
        const fontSize = localStorage.getItem('bible_fontSize') || "16px";
        const lineHeight = localStorage.getItem('bible_lineHeight') || "1.55";
        const container = document.getElementById("versesContainer");
        if (container) { container.style.fontFamily = fontFamily; container.style.fontSize = fontSize; container.style.lineHeight = lineHeight; }
        let style = document.getElementById('dynamicFontStyle');
        if (style) style.remove();
        style = document.createElement('style');
        style.id = 'dynamicFontStyle';
        style.textContent = `.verse-number { font-size: ${fontSize}; } .verse-text { font-size: ${fontSize}; }`;
        document.head.appendChild(style);
    }
    function saveTypography() {
        localStorage.setItem('bible_fontFamily', document.getElementById('fontFamilySelect').value);
        localStorage.setItem('bible_fontSize', document.getElementById('fontSizeSelect').value);
        localStorage.setItem('bible_lineHeight', document.getElementById('lineHeightSelect').value);
        applyTypography();
    }
    function loadTypographyToSelects() {
        const savedFont = localStorage.getItem('bible_fontFamily');
        const savedSize = localStorage.getItem('bible_fontSize');
        const savedLine = localStorage.getItem('bible_lineHeight');
        if (savedFont) document.getElementById('fontFamilySelect').value = savedFont;
        if (savedSize) document.getElementById('fontSizeSelect').value = savedSize;
        if (savedLine) document.getElementById('lineHeightSelect').value = savedLine;
        applyTypography();
    }

    // Event listeners
    document.getElementById("testamentSelect").addEventListener("change", () => { populateBooks(); onLoadChapter(); });
    document.getElementById("loadBtn").addEventListener("click", onLoadChapter);
    document.getElementById("fontFamilySelect").addEventListener("change", saveTypography);
    document.getElementById("fontSizeSelect").addEventListener("change", saveTypography);
    document.getElementById("lineHeightSelect").addEventListener("change", saveTypography);
    document.getElementById("closeModalBtn").addEventListener("click", () => { document.getElementById("noteModal").style.display = "none"; });
    document.getElementById("saveNoteBtn").addEventListener("click", () => {
        const { book, chapter, verse, textSpan } = currentEditing;
        const noteText = document.getElementById("noteTextArea").value;
        let currentColor = textSpan ? textSpan.style.backgroundColor : null;
        if (currentColor && (currentColor === "" || currentColor === "rgba(0, 0, 0, 0)")) currentColor = null;
        saveNoteForVerse(book, chapter, verse, noteText, currentColor);
        updateNotePreview(book, chapter, verse, noteText, currentColor);
        document.getElementById("noteModal").style.display = "none";
    });

    function onLoadChapter() {
        if (!bibleData) return;
        const bookIdx = parseInt(document.getElementById("bookSelect").value);
        const chapterNum = parseInt(document.getElementById("chapterSelect").value);
        const bookName = currentBooksList[bookIdx];
        const bookObj = bibleData.books.find(b => b.name === bookName);
        if (!bookObj || chapterNum < 1 || chapterNum > bookObj.chapters.length) {
            document.getElementById("versesContainer").innerHTML = '<div class="error">บทนี้ไม่มีข้อมูลในพระคัมภีร์</div>';
            return;
        }
        renderChapter(bookIdx, chapterNum-1);
        currentBookIdx = bookIdx;
        currentChapter = chapterNum;
    }

    // เริ่มต้นโหลดข้อมูล
    loadBibleJSON();
    loadTypographyToSelects();
</script>
</body>
</html>
