<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📖 พระคัมภีร์ไบเบิล (ออฟไลน์ 100%)</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f5f2ec;font-family:'Sarabun','Cordia New','Sukhumvit Set','Noto Sans Thai',sans-serif;padding:1rem}
        .app{max-width:1100px;margin:0 auto;background:#fff;border-radius:32px;overflow:hidden;border:1px solid #e1d8cd}
        header{background:#f1ebe2;padding:1.5rem 2rem;text-align:center;border-bottom:1px solid #ddd2c2}
        header h1{font-size:2rem;font-weight:500;color:#2d4a2d}
        header p{font-size:0.85rem;color:#7a6c58;margin-top:0.3rem}
        .controls{background:#fff;padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:1rem;border-bottom:1px solid #ece3d9}
        .ctrl-group{flex:1;min-width:140px}
        .ctrl-group label{display:block;font-size:0.7rem;font-weight:600;color:#9b8e7a;margin-bottom:0.25rem}
        select,button{font-family:inherit;font-size:0.9rem;padding:0.6rem 0.8rem;border-radius:16px;border:1px solid #cfc4b4;background:#fffefc;width:100%;cursor:pointer}
        button{background:#f0ebe2;font-weight:500}
        button:hover{background:#e6ddd1}
        .verses-panel{padding:2rem;background:#fff;min-height:500px}
        .verse-item{margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:1px solid #f0e8df;display:flex;gap:0.8rem}
        .verse-num{font-weight:600;color:#a5825a;min-width:2.5rem}
        .verse-text{flex:1;color:#1e1b16;line-height:1.55}
        .loader,.error-msg{text-align:center;padding:2rem;color:#8f7a5c}
        .error-msg{color:#b15a3c;background:#fff5f0;border-radius:24px}
        footer{background:#f9f7f3;text-align:center;padding:1rem;font-size:0.7rem;color:#8b826e;border-top:1px solid #eae2d6}
        @media (max-width:700px){.controls,.verses-panel{padding:1rem}}
    </style>
</head>
<body>
<div class="app">
    <header>
        <h1>📖 พระคัมภีร์ไบเบิล</h1>
        <p>Thai Standard Version 1971 — อ่านได้ทันที ไม่ต้องโหลดจากเน็ต (ใช้ไฟล์ json ในเครื่อง)</p>
    </header>
    <div class="controls">
        <div class="ctrl-group"><label>พันธสัญญา</label><select id="testamentSelect"><option value="ot">เดิม</option><option value="nt">ใหม่</option></select></div>
        <div class="ctrl-group"><label>หนังสือ</label><select id="bookSelect"></select></div>
        <div class="ctrl-group"><label>บทที่</label><select id="chapterSelect"></select></div>
        <div class="ctrl-group"><button id="loadBtn">อ่านบทนี้</button></div>
    </div>
    <div class="verses-panel" id="versesContainer"><div class="loader">กำลังโหลดข้อมูลพระคัมภีร์จากไฟล์ในเครื่อง...</div></div>
    <footer>ต้องมีไฟล์ th-th1971.json อยู่ในโฟลเดอร์เดียวกันกับไฟล์นี้</footer>
</div>
<script>
(async function(){
    const bibleFile = 'th-th1971.json';
    let bibleData = null;
    let ot = [], nt = [];
    const testa = document.getElementById('testamentSelect');
    const bookSel = document.getElementById('bookSelect');
    const chapSel = document.getElementById('chapterSelect');
    const loadBtn = document.getElementById('loadBtn');
    const container = document.getElementById('versesContainer');

    try {
        const res = await fetch(bibleFile);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        bibleData = await res.json();
        const all = bibleData.books;
        const mtIdx = all.findIndex(b => b.name === "มัทธิว");
        ot = all.slice(0, mtIdx);
        nt = all.slice(mtIdx);
        populateBooks();
        loadChapter();
    } catch(e) {
        container.innerHTML = `<div class="error-msg">❌ ไม่พบไฟล์ ${bibleFile}<br>👉 ดาวน์โหลดไฟล์นี้มาไว้ในโฟลเดอร์เดียวกับ HTML แล้วเปิดใหม่<br><a href="https://cdn.jsdelivr.net/gh/wldeh/bible-api@master/bibles/th-th1971.json" target="_blank">คลิกดาวน์โหลด JSON</a></div>`;
        return;
    }

    function populateBooks() {
        const isOT = testa.value === 'ot';
        const books = isOT ? ot : nt;
        bookSel.innerHTML = '';
        books.forEach((b,i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = b.name;
            bookSel.appendChild(opt);
        });
        updateChapters();
    }
    function updateChapters() {
        const isOT = testa.value === 'ot';
        const books = isOT ? ot : nt;
        const idx = parseInt(bookSel.value);
        if (isNaN(idx)) return;
        const book = books[idx];
        if (!book) return;
        const total = book.chapters.length;
        chapSel.innerHTML = '';
        for(let i=1;i<=total;i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i;
            chapSel.appendChild(opt);
        }
        chapSel.value = 1;
    }
    function loadChapter() {
        if (!bibleData) return;
        const isOT = testa.value === 'ot';
        const books = isOT ? ot : nt;
        const bIdx = parseInt(bookSel.value);
        const cNum = parseInt(chapSel.value);
        if (isNaN(bIdx) || isNaN(cNum)) return;
        const book = books[bIdx];
        if (!book) return;
        const verses = book.chapters[cNum-1];
        if (!verses) {
            container.innerHTML = '<div class="error-msg">ไม่มีข้อความในบทนี้</div>';
            return;
        }
        render(book.name, cNum, verses);
    }
    function render(name, chap, versesArr) {
        container.innerHTML = '';
        const header = document.createElement('div');
        header.style.marginBottom = '1.2rem';
        header.style.fontWeight = '600';
        header.style.color = '#7d6b53';
        header.style.borderLeft = '4px solid #b48c5c';
        header.style.paddingLeft = '0.8rem';
        header.textContent = `${name} ${chap} — ${versesArr.length} ข้อ`;
        container.appendChild(header);
        for(let i=0;i<versesArr.length;i++) {
            const div = document.createElement('div');
            div.className = 'verse-item';
            const numSpan = document.createElement('div');
            numSpan.className = 'verse-num';
            numSpan.textContent = i+1;
            const textSpan = document.createElement('div');
            textSpan.className = 'verse-text';
            textSpan.textContent = versesArr[i];
            div.appendChild(numSpan);
            div.appendChild(textSpan);
            container.appendChild(div);
        }
    }
    testa.addEventListener('change', () => { populateBooks(); loadChapter(); });
    bookSel.addEventListener('change', () => { updateChapters(); loadChapter(); });
    chapSel.addEventListener('change', loadChapter);
    loadBtn.addEventListener('click', loadChapter);
})();
</script>
</body>
</html>
